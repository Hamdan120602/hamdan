<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Hamdan</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        header {
            background: #222;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00adb5;
        }

        section {
            padding: 60px 50px;
        }

        .hero {
            text-align: center;
            background: white;
        }

        .hero img {
            width: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .hero h2 {
            margin-bottom: 10px;
        }

        .skills, .projects, .contact {
            background: white;
            margin-top: 20px;
            border-radius: 10px;
            padding: 30px;
        }

        ul {
            list-style: none;
        }

        ul li {
            background: #eee;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }

        .project-images {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .project-images img {
            width: 200px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .project-images img:hover {
            transform: scale(1.05);
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form input[type="submit"] {
            background: #00adb5;
            color: white;
            border: none;
            cursor: pointer;
        }

        form input[type="submit"]:hover {
            background: #007b80;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: rgb(248, 255, 58);
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>hamdan mahmud Portfolio</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <img src="https://drive.google.com/file/d/1vMIhuDQJB32PKC2hpOTAU1YtmDNIfUnE/view?usp=sharing">
    <h2>hamdan mahmud</h2>
    <p>Beginner Web Developer</p>
</section>

<section class="skills" id="skills">
    <h2>Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>Python</li>
        <li>C</li>
    </ul>
</section>

<section class="projects" id="projects">
    <h2>Projects</h2>
    <ul>
        <li>jalan tol</li>
        <li>Website masjid</li>
        <li>sumur bor</li>
    </ul>

    <div class="project-images">
        <img src="https://sp.yimg.com/ib/th/id/OIP.fQeV83fIdPNlPH2-e8tTEAHaEq?pid=Api&w=148&h=148&c=7&dpr=2&rs=1">
        <img src="https://s.yimg.com/fz/api/res/1.2/kcICvHjbXfeod8gmTzNqSA--~C/YXBwaWQ9c3JjaGRkO2ZpPWZpbGw7aD00MTI7cHhvZmY9NTA7cHlvZmY9MTAwO3E9ODA7c3M9MTt3PTM4OA--/https://i.pinimg.com/736x/95/3e/ff/953eff633d91e8ec2ee62fc21075ec59.jpg">
        <img src="https://tse3.mm.bing.net/th/id/OIP.OJ1t7lHCilVNKqAoErc_CQHaH5?pid=Api&P=0&h=180">
    </div>
</section>

<section class="contact" id="contact">
    <h2>Contact</h2>

    <form>
        <input type="text" placeholder="Nama" required>
        <input type="email" placeholder="Email" required>
        <textarea rows="4" placeholder="Pesan" required></textarea>
        <input type="submit" value="Kirim">
    </form>
</section>

<footer>
    <p>© 2026 hamdan-mahmud Portfolio</p>
</footer>

</body>
</html>
