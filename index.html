<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">CarRent<span>Go</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Cars</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <aside class="sidebar">
        <h3>Filter</h3>
        <div class="sidebar-item">
            <p>Category</p>
            <ul>
                <li><input type="checkbox"> SUV</li>
                <li><input type="checkbox"> Sedan</li>
                <li><input type="checkbox"> MPV</li>
            </ul>
        </div>
        <div class="sidebar-item">
            <p>Price Range</p>
            <input type="range" min="100" max="1000">
        </div>
    </aside>

    <div class="main-content">
        <div id="search">
            <div class="title">
                <h1>Car Rental</h1>
                <p>Find the perfect car for your next adventure</p>
                <hr>
            </div>
            <div class="form-container">
                <div class="form-group">
                    <label for="pickup">Rental Location:</label>
                    <select id="pickup" name="pickup">
                        <option value="">Select Location</option>
                        <option value="location1">Yogyakarta</option>
                        <option value="location2">Bali</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pickup-date">Rental Start Date:</label>
                    <input type="date" id="pickup-date" name="pickup-date">
                </div>
                <div class="form-group">
                    <label for="return-date">Rental End Date:</label>
                    <input type="date" id="return-date" name="return-date">
                </div>
                <button type="submit">Search</button>
            </div>
        </div>

        <div class="car-list">
            <h2>Car List</h2>
            <div class="car-item">
                <img src="https://via.placeholder.com/300x200" alt="Car 1">
                <h3>Car 1</h3>
                <p>Car Detail</p>
            </div>
            <div class="car-item">
                <img src="https://via.placeholder.com/300x200" alt="Car 2">
                <h3>Car 2</h3>
                <p>Car Detail</p>
            </div>
            <div class="car-item">
                <img src="https://via.placeholder.com/300x200" alt="Car 2">
                <h3>Car 3</h3>
                <p>Car Detail</p>
            </div>
            <div class="car-item">
                <img src="https://via.placeholder.com/300x200" alt="Car 2">
                <h3>Car 4</h3>
                <p>Car Detail</p>
            </div>
        </div>
    </div>
</body>

</html>
